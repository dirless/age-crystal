name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build libage.a
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build static archive
        run: make docker-build-static

      - name: Bundle artifacts
        run: tar -czf dist/libage-static-linux-amd64.tar.gz -C dist libage.a libage.h

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/libage-static-linux-amd64.tar.gz
          generate_release_notes: true
